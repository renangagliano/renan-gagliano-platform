<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Institutional technology architecture</title>
  <desc id="desc">Abstract executive technology environment with governance grid, data paths, and civic infrastructure.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071014"/>
      <stop offset=".48" stop-color="#10212a"/>
      <stop offset="1" stop-color="#0f3d42"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f8f7" stop-opacity=".24"/>
